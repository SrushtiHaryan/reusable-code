replicaCount: 2
image:
  repository: nginx
  tag: 1.21.6
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
nodeSelector: {}
tolerations: []
affinity: {}
env:
- name: ENV
  value: production
secrets: {}
config: {}
