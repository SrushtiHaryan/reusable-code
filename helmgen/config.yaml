# Org-wide defaults that apply to all generated charts
maintainers:
  - name: platform-team
    email: platform@myorg.com

labels:
  team: cbtech
  managed-by: helmgen

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

imagePullPolicy: IfNotPresent
